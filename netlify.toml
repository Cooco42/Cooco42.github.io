# Netlify — static site + coach function
[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"

# SPA client-side routing
[[redirects]]
  from = "/api/coach"
  to = "/.netlify/functions/coach"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
